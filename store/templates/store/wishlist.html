<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">❤️ My Wishlist</h2>

    <div class="row">

        {% for item in items %}

        <div class="col-md-4">

            <div class="card p-3 shadow">

                <img src="{{ item.product.image.url }}" class="card-img-top" height="200">

                <h5 class="mt-2">{{ item.product.name }}</h5>

                <p>₹{{ item.product.price }}</p>

                <a href="{% url 'product_detail' item.product.id %}" class="btn btn-primary">
                    View Details
                </a>

            </div>

        </div>

        {% empty %}

        <h4>No items in wishlist</h4>

        {% endfor %}

    </div>

</div>

</body>
</html>
