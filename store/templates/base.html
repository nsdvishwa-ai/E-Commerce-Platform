<!DOCTYPE html>
<html>

<head>

    <title>{% block title %}E-Commerce Store{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            🛒 E-Commerce Store
        </a>

        <div class="ms-auto">

            {% if user.is_authenticated %}

                <a href="{% url 'home' %}" class="btn btn-outline-light me-2">
                    Home
                </a>

                <a href="{% url 'wishlist_page' %}" class="btn btn-warning me-2">
                    ❤️ Wishlist
                </a>

                <a href="{% url 'cart' %}" class="btn btn-success me-2">
                    🛒 Cart ({{ cart_count }})
                </a>

                <span class="text-white me-3">
                    Welcome <strong>{{ user.username }}</strong>
                </span>

                <a href="{% url 'logout' %}" class="btn btn-danger">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-primary me-2">
                    Login
                </a>

                <a href="{% url 'register' %}" class="btn btn-success">
                    Register
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}

    {% endblock %}

</div>

</body>

</html>
